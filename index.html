<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ff7ab6">
    <meta name="description" content="Jednoducha dochadzkova appka pre mobil.">
    <title>Stempeln</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <h1>Stempeln</h1>
        </div>
        <svg class="horse" viewBox="0 0 150 110" role="img" aria-label="Konik">
          <circle cx="82" cy="56" r="46" fill="#fff7ed"/>
          <path d="M56 25 38 7c-4 18 0 31 13 40Z" fill="#b7794f"/>
          <path d="M104 25 121 7c5 18 1 31-12 40Z" fill="#b7794f"/>
          <path d="M62 29c-13 8-21 24-21 42 0 23 17 36 41 36s41-13 41-36c0-18-8-34-21-42-11-7-29-7-40 0Z" fill="#c98b5f"/>
          <path d="M75 18c-14 8-22 25-21 48 7-7 13-9 19-8 6-15 14-27 29-35-7-7-18-9-27-5Z" fill="#5a3a2d"/>
          <path d="M62 66c0-12 8-20 20-20s20 8 20 20v20c0 13-8 21-20 21s-20-8-20-21Z" fill="#f1c7a3"/>
          <circle cx="66" cy="55" r="4" fill="#2b2230"/>
          <circle cx="98" cy="55" r="4" fill="#2b2230"/>
          <circle cx="76" cy="83" r="3" fill="#8a5a44"/>
          <circle cx="88" cy="83" r="3" fill="#8a5a44"/>
          <path d="M74 94c5 4 11 4 16 0" fill="none" stroke="#8a5a44" stroke-linecap="round" stroke-width="4"/>
          <path d="M37 77c-8 0-15-4-19-11 10-2 18 1 24 9Z" fill="#ff7ab6"/>
          <path d="M120 76c8-5 17-6 26-2-6 7-14 10-24 8Z" fill="#72e6b1"/>
        </svg>
      </header>

      <main>
        <section id="loginView" class="panel auth-panel" hidden>
          <p class="eyebrow">Prihlasenie</p>
          <h2>Najprv sa prihlas</h2>
          <button id="googleLoginButton" class="primary wide" type="button">Pokračovať cez Google</button>
          <div class="email-login">
            <input id="emailInput" type="email" inputmode="email" autocomplete="email" placeholder="email@adresa.sk">
            <button id="emailLoginButton" type="button">Poslať link</button>
          </div>
          <p id="loginMessage" class="tiny"></p>
        </section>

        <section id="mainView" hidden>
          <section class="stamp-card">
            <div>
              <p id="todayLabel" class="eyebrow">Dnes</p>
              <h2 id="todayStatus">Nezapisane</h2>
              <p id="todayTimes" class="soft">Prichod a odchod sa zapisu jednym klepnutim.</p>
            </div>
            <div class="stamp-actions">
              <button id="clockInButton" class="stamp in" type="button">Einstempeln</button>
              <button id="clockOutButton" class="stamp out" type="button">Ausstempeln</button>
            </div>
          </section>

          <section class="panel editor-panel">
            <div class="section-title">
              <div>
                <p class="eyebrow">Manualne</p>
                <h2>Upravit den</h2>
              </div>
              <button id="newEntryButton" type="button">Novy den</button>
            </div>
            <form id="entryForm" class="entry-form">
              <input id="entryIdInput" type="hidden">
              <label>
                Datum
                <input id="dateInput" type="date" required>
              </label>
              <div class="two-cols">
                <label>
                  Prichod
                  <input id="clockInInput" type="time">
                </label>
                <label>
                  Odchod
                  <input id="clockOutInput" type="time">
                </label>
              </div>
              <div class="two-cols">
                <label>
                  Prestavka
                  <select id="breakInput">
                    <option value="0" selected>0 min</option>
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="45">45 min</option>
                    <option value="60">60 min</option>
                  </select>
                </label>
                <label>
                  Typ
                  <select id="typeInput">
                    <option value="work" selected>Praca</option>
                    <option value="vacation">Dovolenka</option>
                    <option value="sick">PN</option>
                    <option value="holiday">Sviatok</option>
                  </select>
                </label>
              </div>
              <label>
                Poznamka
                <input id="noteInput" type="text" maxlength="120" placeholder="volitelne">
              </label>
              <div class="form-actions">
                <button class="primary" type="submit">Ulozit</button>
                <button id="deleteButton" class="danger" type="button" hidden>Zmazat</button>
              </div>
            </form>
          </section>

          <section class="panel overview-panel">
            <div class="section-title">
              <div>
                <p class="eyebrow">Prehlad</p>
                <h2>Mesiac</h2>
              </div>
              <input id="monthInput" type="month">
            </div>

            <div class="summary">
              <div>
                <span>Spolu</span>
                <strong id="totalHours">0:00</strong>
              </div>
              <div>
                <span>Dni</span>
                <strong id="totalDays">0</strong>
              </div>
              <div>
                <span>Priemer</span>
                <strong id="averageHours">0:00</strong>
              </div>
            </div>

            <div class="export-actions">
              <button id="exportCsvButton" type="button">Export CSV</button>
              <button id="shareButton" type="button">Zdielat</button>
            </div>

            <div id="entriesList" class="entries-list"></div>
          </section>
        </section>
      </main>

      <footer>
        <button id="syncButton" class="quiet" type="button">Obnovit udaje</button>
        <button id="logoutButton" type="button" hidden>Odhlasit</button>
        <p id="appMessage" class="tiny"></p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
