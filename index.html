<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ff7ab6">
    <meta name="description" content="Jednoducha dochadzkova appka pre mobil.">
    <title>Stempeln</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

      <g class="tulip tulip-b" transform="translate(326 188) rotate(11) scale(.82)">
        <path d="M0 42C12 26 26 24 38 42C30 55 8 55 0 42Z" fill="#ffb15f"/>
        <path d="M5 39C6 24 14 15 20 12C25 20 28 29 33 39Z" fill="#ff8f47"/>
        <path d="M19 50v40" stroke="#69b98c" stroke-width="6" stroke-linecap="round"/>
        <path d="M18 75C5 66-6 66-17 76C-4 83 8 83 18 75Z" fill="#8bd6a7"/>
        <path d="M21 71c14-9 27-8 38 2C46 82 33 82 21 71Z" fill="#8bd6a7"/>
      </g>
      <g class="tulip tulip-c" transform="translate(42 654) rotate(9) scale(.72)">
        <path d="M0 42C12 26 26 24 38 42C30 55 8 55 0 42Z" fill="#ff9fcb"/>
        <path d="M5 39C6 24 14 15 20 12C25 20 28 29 33 39Z" fill="#ff7ab6"/>
        <path d="M19 50v40" stroke="#69b98c" stroke-width="6" stroke-linecap="round"/>
        <path d="M18 75C5 66-6 66-17 76C-4 83 8 83 18 75Z" fill="#8bd6a7"/>
        <path d="M21 71c14-9 27-8 38 2C46 82 33 82 21 71Z" fill="#8bd6a7"/>
      </g>
      <g class="tulip tulip-d" transform="translate(315 706) rotate(-14) scale(.68)">
        <path d="M0 42C12 26 26 24 38 42C30 55 8 55 0 42Z" fill="#ffc06d"/>
        <path d="M5 39C6 24 14 15 20 12C25 20 28 29 33 39Z" fill="#ff9d4d"/>
        <path d="M19 50v40" stroke="#69b98c" stroke-width="6" stroke-linecap="round"/>
        <path d="M18 75C5 66-6 66-17 76C-4 83 8 83 18 75Z" fill="#8bd6a7"/>
        <path d="M21 71c14-9 27-8 38 2C46 82 33 82 21 71Z" fill="#8bd6a7"/>
      </g>
    </svg>
    <div class="app-shell">
      <header class="hero">
        <div>
          <h1>Stempeln</h1>
        </div>
        <svg class="horse" viewBox="0 0 164 116" role="img" aria-label="Beziaci konik">
          <ellipse cx="78" cy="78" rx="66" ry="24" fill="#fff7ed" opacity=".86"/>
          <path d="M26 74c18-20 42-31 70-29 22 2 39 12 51 30-18 17-43 26-74 24-24-2-40-10-47-25Z" fill="#c98b5f"/>
          <path d="M117 49c10-17 24-25 42-24-4 18-15 30-33 37Z" fill="#c98b5f"/>
          <path d="M137 29l10-17 4 20Z" fill="#9b633f"/>
          <path d="M121 45c9-9 19-14 31-14-2 14-10 24-23 30Z" fill="#f1c7a3" opacity=".68"/>
          <path d="M84 43c16 1 30 7 41 18-19-4-38-3-57 3 3-11 8-18 16-21Z" fill="#5a3a2d"/>
          <circle cx="142" cy="38" r="3.5" fill="#2b2230"/>
          <path d="M26 74c-9-12-18-17-28-15 8 13 18 21 31 24Z" fill="#5a3a2d"/>
          <path d="M53 93c-11 9-18 17-22 26" fill="none" stroke="#8a5a44" stroke-width="9" stroke-linecap="round"/>
          <path d="M74 96c-1 13 2 23 10 31" fill="none" stroke="#8a5a44" stroke-width="9" stroke-linecap="round"/>
          <path d="M101 92c11 6 21 14 30 26" fill="none" stroke="#8a5a44" stroke-width="9" stroke-linecap="round"/>
          <path d="M121 84c13-1 25-5 36-12" fill="none" stroke="#8a5a44" stroke-width="9" stroke-linecap="round"/>
          <path d="M34 58c7 8 17 13 31 14" fill="none" stroke="#f1c7a3" stroke-width="8" stroke-linecap="round" opacity=".72"/>
          <path d="M18 33c8-7 18-7 29 0-7 8-17 10-29 6Z" fill="#ff7ab6" opacity=".82"/>
          <path d="M119 93c12 8 25 10 39 4-10 11-24 16-42 14Z" fill="#72e6b1" opacity=".72"/>
        </svg>
      </header>

      <main>
        <section id="loginView" class="panel auth-panel" hidden>
          <p class="eyebrow">Prihlasenie</p>
          <h2>Najprv sa prihlas</h2>
          <button id="googleLoginButton" class="primary wide" type="button">Pokračovať cez Google</button>
          <div class="email-login">
            <input id="emailInput" type="email" inputmode="email" autocomplete="email" placeholder="email@adresa.sk">
            <button id="emailLoginButton" type="button">Poslať link</button>
          </div>
          <p id="loginMessage" class="tiny"></p>
        </section>

        <section id="mainView" hidden>
          <section class="stamp-card">
            <div>
              <p id="todayLabel" class="eyebrow">Dnes</p>
              <h2 id="todayStatus">Nezapisane</h2>
              <p id="todayTimes" class="soft">Prichod a odchod sa zapisu jednym klepnutim.</p>
            </div>
            <div class="stamp-actions">
              <button id="clockInButton" class="stamp in" type="button">Einstempeln</button>
              <button id="clockOutButton" class="stamp out" type="button">Ausstempeln</button>
            </div>
          </section>

          <section class="panel editor-panel">
            <div class="section-title">
              <div>
                <p class="eyebrow">Manualne</p>
                <h2>Upravit den</h2>
              </div>
              <button id="newEntryButton" type="button">Novy den</button>
            </div>
            <form id="entryForm" class="entry-form">
              <input id="entryIdInput" type="hidden">
              <label>
                Datum
                <input id="dateInput" type="date" required>
              </label>
              <div class="two-cols">
                <label>
                  Prichod
                  <input id="clockInInput" type="time">
                </label>
                <label>
                  Odchod
                  <input id="clockOutInput" type="time">
                </label>
              </div>
              <div class="two-cols">
                <label>
                  Prestavka
                  <select id="breakInput">
                    <option value="0" selected>0 min</option>
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="45">45 min</option>
                    <option value="60">60 min</option>
                  </select>
                </label>
                <label>
                  Typ
                  <select id="typeInput">
                    <option value="work" selected>Praca</option>
                    <option value="vacation">Dovolenka</option>
                    <option value="sick">PN</option>
                    <option value="holiday">Sviatok</option>
                  </select>
                </label>
              </div>
              <label>
                Poznamka
                <input id="noteInput" type="text" maxlength="120" placeholder="volitelne">
              </label>
              <div class="form-actions">
                <button class="primary" type="submit">Ulozit</button>
                <button id="deleteButton" class="danger" type="button" hidden>Zmazat</button>
              </div>
            </form>
          </section>

          <section class="panel overview-panel">
            <div class="section-title">
              <div>
                <p class="eyebrow">Prehlad</p>
                <h2>Mesiac</h2>
              </div>
              <input id="monthInput" type="month">
            </div>

            <div class="summary">
              <div>
                <span>Spolu</span>
                <strong id="totalHours">0:00</strong>
              </div>
              <div>
                <span>Dni</span>
                <strong id="totalDays">0</strong>
              </div>
              <div>
                <span>Priemer</span>
                <strong id="averageHours">0:00</strong>
              </div>
            </div>

            <div class="export-actions">
              <button id="exportCsvButton" type="button">Export CSV</button>
              <button id="shareButton" type="button">Zdielat</button>
            </div>

            <div id="entriesList" class="entries-list"></div>
          </section>
        </section>
      </main>

      <footer>
        <button id="syncButton" class="quiet" type="button">Obnovit udaje</button>
        <button id="logoutButton" type="button" hidden>Odhlasit</button>
        <p id="appMessage" class="tiny"></p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
